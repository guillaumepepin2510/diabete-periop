<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diabète Péri-Opératoire</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f2f4f7;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
color:#005eb8;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,
select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
background:#005eb8;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
margin-right:10px;
}

button:hover{
background:#00448c;
}

.traitement-row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.traitement-row input{
flex:1;
}

.resultat{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-top:20px;
}

.alert{
background:#fff3cd;
border-left:5px solid #ffc107;
padding:10px;
margin:10px 0;
}

.success{
background:#e8f5e9;
border-left:5px solid #28a745;
padding:10px;
margin:10px 0;
}

ul{
margin-top:5px;
}

.print-zone{
padding:15px;
}

.section-title{
color:#005eb8;
font-size:20px;
margin-top:20px;
}

.checkbox-group{
margin-top:10px;
}

.checkbox-group label{
font-weight:normal;
display:block;
margin-top:5px;
}

.footer{
margin-top:30px;
font-size:12px;
color:#666;
}

.checkbox-group label{
display:flex;
align-items:center;
gap:10px;
font-weight:normal;
}

.checkbox-group input[type="checkbox"]{
width:auto;
margin:0;
}

</style>

</head>

<body>

<div class="container">

<h1>Recommandations Diabète Péri-Opératoire</h1>

<div class="card">

<label>Type de diabète</label>

<select id="typeDiabete">
<option value="DT1">DT1</option>
<option value="DT2" selected>DT2</option>
</select>

<label>HbA1c (%) - Facultatif</label>

<input
type="number"
step="0.1"
id="hba1c"
placeholder="Ex : 7.2"
/>

<label>Type d'intervention</label>

<select id="intervention">
<option>1 repas jeûné ou moins</option>
<option>2 repas jeûnés ou plus</option>
<option>≥ 2 repas jeûnés avec jeûne prolongé</option>
<option>Urgence</option>
</select>

<div class="checkbox-group">

<label>
<input type="checkbox" id="pompeInsuline">
 Pompe à insuline
</label>

</div>

<h2>Traitements</h2>

<div id="traitementsContainer">

<div class="traitement-row">
<input
type="text"
class="traitement"
list="listeMedicaments"
placeholder="Ex : Ozempic, Jardiance, Metformine"
/>
</div>

</div>

<button onclick="ajouterTraitement()">
+ Ajouter un traitement
</button>

<br>

<button onclick="genererRecommandations()">
Générer les recommandations
</button>

<button onclick="exportPDF()">
Exporter PDF
</button>

</div>

<div
id="resultat"
class="resultat"
style="display:none;">
</div>

</div>

<script>

/* ==========================
   BASE MEDICAMENTEUSE
   ========================== */

const medicaments = {

"OZEMPIC":{
classe:"GLP1",
recommandations:[
"Ne pas arrêter le traitement",
"Ne pas prolonger le jeûne",
"Rechercher une gastroparésie",
"Échographie gastrique recommandée",
"ISR si échographie impossible"
],
alertes:[
"Risque de gastroparésie"
]
},

"TRULICITY":{
classe:"GLP1",
recommandations:[
"Ne pas arrêter le traitement",
"Ne pas prolonger le jeûne",
"Rechercher une gastroparésie",
"Échographie gastrique recommandée",
"ISR si échographie impossible"
],
alertes:[
"Risque de gastroparésie"
]
},

"WEGOVY":{
classe:"GLP1",
recommandations:[
"Ne pas arrêter le traitement",
"Ne pas prolonger le jeûne",
"Rechercher une gastroparésie",
"Échographie gastrique recommandée",
"ISR si échographie impossible"
],
alertes:[
"Risque de gastroparésie"
]
},

 "VICTOZA":{
classe:"GLP1",
recommandations:[
"Ne pas arrêter le traitement",
"Ne pas prolonger le jeûne",
"Rechercher une gastroparésie",
"Échographie gastrique recommandée",
"ISR si échographie impossible"
],
alertes:[
"Risque de gastroparésie"
]
},

"XULTOPHY":{
classe:"GLP1",
recommandations:[
"Ne pas arrêter le traitement",
"Ne pas prolonger le jeûne",
"Rechercher une gastroparésie",
"Échographie gastrique recommandée",
"ISR si échographie impossible",
"Maintien de l'insuline basale"
],
alertes:[
"Risque de gastroparésie"
]
},

"INVOKANA":{
classe:"SGLT2",
recommandations:[
"Dernière prise J-3",
"Cétonémie si arrêt inférieur à 3 jours"
],
alertes:[
"Risque d'acidocétose euglycémique"
]
},

"GLUCOPHAGE":{
classe:"BIGUANIDE",
recommandations:[],
alertes:[]
},

"STAGID":{
classe:"BIGUANIDE",
recommandations:[],
alertes:[]
},

"ONGLYZA":{
classe:"DPP4",
recommandations:[],
alertes:[]
},

"GALVUS":{
classe:"DPP4",
recommandations:[],
alertes:[]
},

"LEVEMIR":{
classe:"INSULINE BASALE",
recommandations:[
"Maintien de l'insuline basale"
],
alertes:[]
},

"ABASAGLAR":{
classe:"INSULINE BASALE",
recommandations:[
"Maintien de l'insuline basale"
],
alertes:[]
},

"HUMALOG":{
classe:"INSULINE RAPIDE",
recommandations:[
"Supprimer les doses correspondant aux repas jeûnés"
],
alertes:[]
},

"NOVORAPID":{
classe:"INSULINE RAPIDE",
recommandations:[
"Supprimer les doses correspondant aux repas jeûnés"
],
alertes:[]
},

"FIASP":{
classe:"INSULINE RAPIDE",
recommandations:[
"Supprimer les doses correspondant aux repas jeûnés"
],
alertes:[]
},

"APIDRA":{
classe:"INSULINE RAPIDE",
recommandations:[
"Supprimer les doses correspondant aux repas jeûnés"
],
alertes:[]
},

"FORXIGA":{
classe:"SGLT2",
recommandations:[
"Dernière prise J-3",
"Cétonémie si arrêt inférieur à 3 jours"
],
alertes:[
"Risque d'acidocétose euglycémique"
]
},

"JARDIANCE":{
classe:"SGLT2",
recommandations:[
"Dernière prise J-3",
"Cétonémie si arrêt inférieur à 3 jours"
],
alertes:[
"Risque d'acidocétose euglycémique"
]
},

"XIGDUO":{
classe:"SGLT2",
recommandations:[
"Dernière prise J-3",
"Cétonémie si arrêt inférieur à 3 jours"
],
alertes:[
"Risque d'acidocétose euglycémique"
]
},

"SYNJARDY":{
classe:"SGLT2",
recommandations:[
"Dernière prise J-3",
"Cétonémie si arrêt inférieur à 3 jours"
],
alertes:[
"Risque d'acidocétose euglycémique"
]
},

"METFORMINE":{
classe:"BIGUANIDE",
recommandations:[],
alertes:[]
},

"JANUVIA":{
classe:"DPP4",
recommandations:[
"Suivre protocole standard"
],
alertes:[]
},

"LANTUS":{
classe:"INSULINE BASALE",
recommandations:[
"Maintien de l'insuline basale"
],
alertes:[]
},

"TOUJEO":{
classe:"INSULINE BASALE",
recommandations:[
"Maintien de l'insuline basale"
],
alertes:[]
},

"TRESIBA":{
classe:"INSULINE BASALE",
recommandations:[
"Maintien de l'insuline basale"
],
alertes:[]
},

};

 const listeMedicaments = Object.keys(medicaments);

/* ==========================
   AJOUT TRAITEMENT
   ========================== */

function ajouterTraitement(){

const container =
document.getElementById(
"traitementsContainer"
);

const div =
document.createElement("div");

div.className =
"traitement-row";

div.innerHTML = `
<input
type="text"
class="traitement"
list="listeMedicaments"
placeholder="Nom du médicament"
/>
`;

container.appendChild(div);

}

/* ==========================
   FONCTIONS V2
   ========================== */

function genererRecommandations(){

const typeDiabete =
document.getElementById("typeDiabete").value;

const hba1c =
document.getElementById("hba1c").value;

const intervention =
document.getElementById("intervention").value;

const pompeInsuline =
document.getElementById("pompeInsuline").checked;

const traitements =
[...new Set(
Array.from(
document.querySelectorAll(".traitement")
)
.map(x => x.value.trim().toUpperCase())
.filter(x => x !== "")
)];

let recommandationsParMedicament = "";
let alertesParMedicament = "";

traitements.forEach(traitement => {

if(
medicaments[traitement]
&&
medicaments[traitement].recommandations.length > 0
){

recommandationsParMedicament += `
<h4>${traitement}</h4>
<ul>
${medicaments[traitement].recommandations
.map(r => `<li>${r}</li>`)
.join("")}
</ul>
`;

}

if(
medicaments[traitement]
&&
medicaments[traitement].alertes.length > 0
){

alertesParMedicament += `
<h4>${traitement}</h4>
<ul>
${medicaments[traitement].alertes
.map(a => `<li>${a}</li>`)
.join("")}
</ul>
`;

}

});

let recommandationsGenerales = "";
let alertesGenerales = "";

const hba1cValeur = parseFloat(
hba1c.replace(",", ".")
);

if(!isNaN(hba1cValeur)){

if(
hba1cValeur < 5
||
hba1cValeur > 9
){

alertesGenerales += `
<li>
HbA1c ${hba1cValeur}% :
chirurgie à différer si non urgente
</li>
`;

}

else if(
(hba1cValeur >= 5 && hba1cValeur < 6)
||
(hba1cValeur >= 8 && hba1cValeur <= 9)
){

alertesGenerales += `
<li>
HbA1c ${hba1cValeur}% :
avis diabétologue ou médecin traitant recommandé
</li>
`;

}

}

let conduitePersonnalisee = "";

let protocoleJourJ = "";

if(
(
traitements.includes("METFORMINE")
||
traitements.includes("GLUCOPHAGE")
||
traitements.includes("STAGID")
)
&&
intervention.includes("1 repas")
){

recommandationsParMedicament += `
<h4>METFORMINE</h4>
<ul>
<li>Pas d'arrêt nécessaire</li>
</ul>
`;

}

if(
(
traitements.includes("METFORMINE")
||
traitements.includes("GLUCOPHAGE")
||
traitements.includes("STAGID")
)
&&
(
intervention.includes("2 repas")
||
intervention.includes("jeûne prolongé")
)
){

recommandationsParMedicament += `
<h4>METFORMINE</h4>
<ul>
<li>Arrêt du traitement pendant la période de jeûne</li>
</ul>
`;

}

const presenceInsulineBasale =
traitements.includes("LANTUS")
||
traitements.includes("TOUJEO")
||
traitements.includes("TRESIBA")
||
traitements.includes("LEVEMIR")
||
traitements.includes("ABASAGLAR")
||
traitements.includes("XULTOPHY");

const pompeSeule =
pompeInsuline
&&
!presenceInsulineBasale;

if(
typeDiabete === "DT1"
&&
intervention.includes("1 repas")
){

protocoleJourJ += `
<li><strong>Avant départ au bloc :</strong> glycémie capillaire</li>

<li>Maintien de l'insuline basale</li>

<li><strong>À partir de 6h-7h :</strong></li>

<li>Perfusion G10%</li>

<ul>
<li>40 mL/h si glycémie &lt; 3 g/L</li>
<li>60 mL/h si glycémie &lt; 0,9 g/L</li>
</ul>

<li><strong>Après intervention :</strong> glycémie capillaire en SSPI</li>
`;

}

if(
typeDiabete === "DT1"
&&
intervention.includes("2 repas")
){

protocoleJourJ += `
<li><strong>Avant départ au bloc :</strong> glycémie capillaire</li>

<li><strong>Pendant le jeûne :</strong> glycémie capillaire toutes les 3 à 4 heures</li>

${pompeSeule ? `
<li>Pas d'arrêt de la pompe à insuline avant l'intervention</li>
` : `
<li>Maintien de l'insuline basale</li>

${pompeInsuline ? `
<li>Pas d'arrêt de la pompe à insuline avant l'intervention</li>
` : ""}
`}
`;

if(pompeInsuline){

protocoleJourJ += `
<li>
Si pompe à insuline :
arrêt à l'arrivée au bloc sauf si :
<ul>
<li>intervention courte (&lt; 2 h)</li>
<li>dispositif visible et accessible</li>
</ul>
</li>
`;
}

protocoleJourJ += `
<li><strong>À partir de 6h-7h :</strong></li>

<li>Perfusion G10%</li>

<ul>
<li>40 mL/h si glycémie &lt; 3 g/L</li>
<li>60 mL/h si glycémie &lt; 0,9 g/L</li>
</ul>

<li><strong>Après intervention :</strong> glycémie capillaire en SSPI</li>
`;

}

if(
typeDiabete === "DT2"
&&
!presenceInsulineBasale
&&
intervention.includes("1 repas")
){

protocoleJourJ += `
<li><strong>Avant départ au bloc :</strong> glycémie capillaire</li>
<li><strong>Après intervention :</strong> glycémie capillaire en SSPI</li>
<li>Pas de perfusion glucosée systématique</li>
`;

}

if(
typeDiabete === "DT2"
&&
!presenceInsulineBasale
&&
intervention.includes("2 repas")
){

protocoleJourJ += `
<li><strong>Avant départ au bloc :</strong> glycémie capillaire</li>
<li><strong>Pendant le jeûne :</strong> glycémie capillaire toutes les 3 à 4 heures</li>
<li><strong>Après intervention :</strong> glycémie capillaire en SSPI</li>
`;
}

if(
typeDiabete === "DT2"
&&
presenceInsulineBasale
&&
intervention.includes("1 repas")
){

protocoleJourJ += `
<li>Comme DT1 avec 1 repas jeûné</li>
<li>Pas de prise des ADO le matin</li>
`;

}

if(
typeDiabete === "DT2"
&&
presenceInsulineBasale
&&
intervention.includes("2 repas")
){

protocoleJourJ += `
<li><strong>Avant départ au bloc :</strong> glycémie capillaire</li>
<li><strong>Pendant le jeûne :</strong> glycémie capillaire toutes les 3 à 4 heures</li>
<li>Maintien de l'insuline basale</li>
<li>Pas de prise des ADO</li>
<li>À partir de 6h-7h :</li>
<li>Perfusion G10%</li>
<ul>
<li>40 mL/h si glycémie &lt; 3 g/L</li>
<li>60 mL/h si glycémie &lt; 0,9 g/L</li>
</ul>
<li><strong>Après intervention :</strong> glycémie capillaire en SSPI</li>
`;

}

if(
(
traitements.includes("HUMALOG")
||
traitements.includes("NOVORAPID")
||
traitements.includes("FIASP")
||
traitements.includes("APIDRA")
)
&&
intervention.includes("1 repas")
){

recommandationsGenerales += `
<li>INSULINE RAPIDE : supprimer la dose correspondant au repas jeûné</li>
`;

}

if(
(
traitements.includes("HUMALOG")
||
traitements.includes("NOVORAPID")
||
traitements.includes("FIASP")
||
traitements.includes("APIDRA")
)
&&
intervention.includes("2 repas")
){

recommandationsGenerales += `
<li>INSULINE RAPIDE : supprimer les doses correspondant aux repas jeûnés</li>
`;

}

if(
traitements.includes("FORXIGA")
||
traitements.includes("JARDIANCE")
||
traitements.includes("SYNJARDY")
||
traitements.includes("XIGDUO")
){

conduitePersonnalisee += `
<li>
SGLT2 : arrêt recommandé 3 jours avant la chirurgie
</li>
`;

}

if(
traitements.includes("OZEMPIC")
||
traitements.includes("TRULICITY")
||
traitements.includes("WEGOVY")
||
traitements.includes("VICTOZA")
||
traitements.includes("XULTOPHY")
){

conduitePersonnalisee += `
<li>
GLP1 : évaluer le risque de gastroparésie avant l'anesthésie
</li>
`;

}

if(
typeDiabete === "DT1"
){

conduitePersonnalisee += `
<li>
DT1 : maintenir impérativement une insuline basale
</li>
`;

}

if(
pompeInsuline
){

conduitePersonnalisee += `
<li>
POMPE À INSULINE : pas d'arrêt avant l'intervention
</li>

<li>
Arrêt de la pompe à l'arrivée au bloc
</li>

<li>
Maintien possible si :
<ul>
<li>intervention courte (&lt; 2 h)</li>
<li>dispositif visible et accessible</li>
</ul>
</li>
`;

}
 
if(typeDiabete === "DT1"){

alertesGenerales += `
<li>DT1 : ne jamais arrêter l'insuline basale</li>
`;

}

recommandationsGenerales += `
<li>Objectif glycémique : 5 à 10 mmol/L</li>
`;

let html = "";

html += `
<div class="print-zone">

<h2>
Recommandations péri-opératoires
</h2>

<p>
<strong>Type de diabète :</strong>
${typeDiabete}
</p>

<p>
<strong>HbA1c :</strong>
${hba1c || "Non renseignée"}
</p>

<p>
<strong>Intervention :</strong>
${intervention}
</p>

<h3 class="section-title">
Traitements
</h3>

<ul>
${traitements.map(t => `<li>${t}</li>`).join("")}
</ul>

<h3 class="section-title">
Recommandations
</h3>

<div class="success">

${recommandationsParMedicament}

<hr>

<h4>Recommandations générales</h4>

<ul>
${conduitePersonnalisee}
${recommandationsGenerales}
</ul>

</div>

<h3 class="section-title">
Protocole Jour J
</h3>

<div class="success">
<ul>
${protocoleJourJ}
</ul>
</div>

<h3 class="section-title">
Alertes
</h3>

<div class="alert">

${alertesParMedicament}

<hr>

<h4>Alertes générales</h4>

<ul>
${alertesGenerales}
</ul>

</div>

<div class="footer">
Application Diabète Péri-Opératoire
</div>

</div>
`;

const resultat =
document.getElementById("resultat");

resultat.innerHTML = html;

resultat.style.display =
"block";

}

function exportPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

const typeDiabete =
document.getElementById("typeDiabete").value;

const hba1c =
document.getElementById("hba1c").value || "Non renseignée";

const intervention =
document.getElementById("intervention").value;

const traitements =
Array.from(
document.querySelectorAll(".traitement")
)
.map(x => x.value.trim().toUpperCase())
.filter(x => x !== "");

const recommandations = [];
const alertes = [];

traitements.forEach(traitement => {

if(medicaments[traitement]){

medicaments[traitement]
.recommandations
.forEach(r => {
if(!recommandations.includes(r))
recommandations.push(r);
});

medicaments[traitement]
.alertes
.forEach(a => {
if(!alertes.includes(a))
alertes.push(a);
});

}

});

if(typeDiabete==="DT1"){
alertes.push(
"Ne jamais arrêter l'insuline basale"
);
}

recommandations.push(
"Objectif glycémique : 5 à 10 mmol/L"
);

let y = 15;

doc.setFontSize(16);
doc.text(
"RECOMMANDATIONS DIABETE PERI-OPERATOIRE",
10,
y
);

y += 15;

doc.setFontSize(12);

doc.text(
"Type de diabete : " + typeDiabete,
10,
y
);

y += 10;

doc.text(
"HbA1c : " + hba1c,
10,
y
);

y += 10;

doc.text(
"Intervention : " + intervention,
10,
y
);

y += 15;

doc.setFontSize(14);
doc.text(
"TRAITEMENTS",
10,
y
);

y += 10;

doc.setFontSize(12);

traitements.forEach(t => {

doc.text(
"• " + t,
15,
y
);

y += 8;

});

y += 5;

doc.setFontSize(14);
doc.text(
"CONDUITE A TENIR",
10,
y
);

y += 10;

doc.setFontSize(12);

recommandations.forEach(r => {

doc.text(
"• " + r,
15,
y
);

y += 8;

if(y>270){
doc.addPage();
y=20;
}

});

y += 5;

doc.setFontSize(14);
doc.text(
"ALERTES",
10,
y
);

y += 10;

doc.setFontSize(12);

alertes.forEach(a => {

doc.text(
"• " + a,
15,
y
);

y += 8;

if(y>270){
doc.addPage();
y=20;
}

});

doc.save(
"recommandations_diabete.pdf"
);

}

</script>

<datalist id="listeMedicaments">

<option value="OZEMPIC">
<option value="TRULICITY">
<option value="WEGOVY">
<option value="VICTOZA">
<option value="XULTOPHY">

<option value="FORXIGA">
<option value="JARDIANCE">
<option value="INVOKANA">
<option value="XIGDUO">
<option value="SYNJARDY">

<option value="METFORMINE">
<option value="GLUCOPHAGE">
<option value="STAGID">

<option value="JANUVIA">
<option value="ONGLYZA">
