<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diabète Péri-Opératoire</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f2f4f7;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
color:#005eb8;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,
select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
background:#005eb8;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
margin-right:10px;
}

button:hover{
background:#00448c;
}

.traitement-row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.traitement-row input{
flex:1;
}

.resultat{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-top:20px;
}

.alert{
background:#fff3cd;
border-left:5px solid #ffc107;
padding:10px;
margin:10px 0;
}

.success{
background:#e8f5e9;
border-left:5px solid #28a745;
padding:10px;
margin:10px 0;
}

ul{
margin-top:5px;
}

.print-zone{
padding:15px;
}

.section-title{
color:#005eb8;
font-size:20px;
margin-top:20px;
}

.checkbox-group{
margin-top:10px;
}

.checkbox-group label{
font-weight:normal;
display:block;
margin-top:5px;
}

.footer{
margin-top:30px;
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<h1>Recommandations Diabète Péri-Opératoire</h1>

<div class="card">

<label>Type de diabète</label>

<select id="typeDiabete">
<option value="DT1">DT1</option>
<option value="DT2" selected>DT2</option>
</select>

<label>HbA1c (%) - Facultatif</label>

<input
type="number"
step="0.1"
id="hba1c"
placeholder="Ex : 7.2"
/>

<label>Type d'intervention</label>

<select id="intervention">
<option>≤ 1 repas jeûné</option>
<option>≥ 2 repas jeûnés</option>
<option>Urgence</option>
</select>

<div class="checkbox-group">

<label>
<input type="checkbox" id="jeuneProlonge">
 Jeûne prolongé
</label>

<label>
<input type="checkbox" id="pompeInsuline">
 Pompe à insuline
</label>

</div>

<h2>Traitements</h2>

<div id="traitementsContainer">

<div class="traitement-row">
<input
type="text"
class="traitement"
placeholder="Ex : Ozempic, Jardiance, Metformine"
/>
</div>

</div>

<button onclick="ajouterTraitement()">
+ Ajouter un traitement
</button>

<br>

<button onclick="genererRecommandations()">
Générer les recommandations
</button>

<button onclick="exportPDF()">
Exporter PDF
</button>

</div>

<div
id="resultat"
class="resultat"
style="display:none;">
</div>

</div>

<script>

/* ==========================
   BASE MEDICAMENTEUSE
   ========================== */

const medicaments = {};

/* ==========================
   AJOUT TRAITEMENT
   ========================== */

function ajouterTraitement(){

const container =
document.getElementById(
"traitementsContainer"
);

const div =
document.createElement("div");

div.className =
"traitement-row";

div.innerHTML = `
<input
type="text"
class="traitement"
placeholder="Nom du médicament"
/>
`;

container.appendChild(div);

}

/* ==========================
   FONCTIONS V2
   ========================== */

function genererRecommandations(){
alert(
"Bloc 2 à ajouter ensuite"
);
}

function exportPDF(){
alert(
"Bloc PDF à ajouter ensuite"
);
}

</script>

</body>
</html>
